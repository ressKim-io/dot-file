# ========================================
# tmux 설정 - 개인 dotfiles
# ========================================
# 기본 사상:
# - 합리적 기본값 (mouse on, 1-base index, 큰 history)
# - vim 친화 (h/j/k/l 페인 이동)
# - TPM(Tmux Plugin Manager)으로 resurrect/continuum/yank 관리

# ========================================
# Prefix: Ctrl-a (Ctrl-b 대신, 한 손 접근성)
# ========================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ========================================
# 일반 설정
# ========================================
set -g mouse on                   # 마우스 스크롤/리사이즈
set -g base-index 1               # 윈도우 1번부터
setw -g pane-base-index 1         # 페인 1번부터
set -g renumber-windows on        # 윈도우 닫으면 번호 재정렬
set -g history-limit 50000        # 스크롤백 5만줄
set -g display-time 2000          # 메시지 2초 노출
set -g escape-time 10             # ESC 지연 최소화 (vim 친화)
set -g focus-events on            # 포커스 이벤트 (autoread 등)
set -g set-titles on              # 터미널 제목 갱신
set -g set-titles-string "#S / #W"

# 색상: 256 컬러 + truecolor 패스스루
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

# ========================================
# 키바인딩
# ========================================
# 설정 리로드: prefix + r
bind r source-file ~/.tmux.conf \; display "✅ tmux.conf reloaded"

# 직관적인 분할: prefix + | (수직), prefix + - (수평)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 새 윈도우도 현재 경로에서
bind c new-window -c "#{pane_current_path}"

# vim 스타일 페인 이동: prefix + h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim 스타일 페인 리사이즈: prefix + H/J/K/L (반복 가능)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 윈도우 이동: prefix + Shift+h/l
bind -r N previous-window
bind -r M next-window

# Copy mode: vi 키
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ========================================
# 상태바 (간결한 톤)
# ========================================
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=default,fg=colour244"

# 좌측: 세션 이름
set -g status-left-length 40
set -g status-left "#[fg=colour39,bold] #S #[fg=colour244]│ "

# 우측: kubectl 컨텍스트(있으면) + 시간
set -g status-right-length 80
set -g status-right "#[fg=colour108]#(kubectl config current-context 2>/dev/null) #[fg=colour244]│ #[fg=colour250]%Y-%m-%d %H:%M "

# 윈도우 표시
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour39,bold] #I:#W "
setw -g window-status-current-style "bg=default"

# 페인 경계
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# ========================================
# TPM (Tmux Plugin Manager)
# ========================================
# 설치: install.sh가 ~/.tmux/plugins/tpm을 자동 클론합니다.
# 플러그인 추가/갱신: prefix + I (대문자) / prefix + U
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'         # 시스템 클립보드 yank
set -g @plugin 'tmux-plugins/tmux-resurrect'    # 세션 저장/복원
set -g @plugin 'tmux-plugins/tmux-continuum'    # 자동 저장/복원

# resurrect 옵션: vim/nvim 세션도 복원
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# continuum: 15분마다 자동 저장
set -g @continuum-save-interval '15'
# set -g @continuum-restore 'on'   # 부팅 자동 복원은 사용자 선호 (기본 off)

# TPM 초기화 (반드시 파일 마지막)
run '~/.tmux/plugins/tpm/tpm'
